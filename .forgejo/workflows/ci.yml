name: Go CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libpcap
        run: apt-get update && apt-get install -y libpcap-dev

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: https://github.com/golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: forgejo/upload-artifact@v4
        with:
          name: coverage-reports.zip
          path: coverage.out

  build:
    needs: test
    runs-on: docker
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - distro: debian
            container: golang:1.25-trixie
            suffix: linux-amd64-deb
            pkg_cmd: apt-get update && apt-get install -y libpcap-dev nodejs
          - distro: fedora
            container: fedora:latest
            suffix: linux-amd64-rpm
            pkg_cmd: dnf install -y git golang libpcap-devel nodejs
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install build dependencies
        run: ${{ matrix.pkg_cmd }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: |
          TAG="$(git describe --tags --exact-match 2>/dev/null || git describe --tags --always)"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X main.version=${TAG} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dashcap-${{ matrix.suffix }} ./cmd/dashcap

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums-${{ matrix.suffix }}.txt

      - name: Upload release artifacts
        uses: forgejo/upload-artifact@v4
        with:
          name: dashcap-${{ matrix.suffix }}.zip
          path: dist/
